name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout decks (private)
        uses: actions/checkout@v4
        with:
          repository: david-streamlio/david-decks
          ssh-key: ${{ secrets.DECKS_DEPLOY_KEY }}
          path: .decks
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build public decks into public/talks/slides/
        run: |
          cd .decks
          npm ci
          npm run build:all          # only visibility:'public' decks → dist/<slug>/
          cd "$GITHUB_WORKSPACE"
          mkdir -p public/talks/slides
          cp -r .decks/dist/* public/talks/slides/
      - name: Install, build, and upload
        uses: withastro/action@v3
        # Defaults: path = repo root, node-version = 20, package manager auto-detected

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
